<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Smart Waste Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #81C784 0%, #A5D6A7 100%);
            --secondary-gradient: linear-gradient(135deg, #C8E6C9 0%, #E8F5E8 100%);
            --success-gradient: linear-gradient(135deg, #66BB6A 0%, #81C784 100%);
            --glass-bg: rgba(255, 255, 255, 0.3);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #E8F5E8 0%, #C8E6C9 50%, #A5D6A7 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            color: #000000;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #E8F5E8 0%, #C8E6C9 50%, #A5D6A7 100%);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(129, 199, 132, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(165, 214, 167, 0.3) 0%, transparent 50%);
            z-index: -1;
            animation: backgroundShift 15s ease-in-out infinite;
        }

        @keyframes backgroundShift {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(-20px) translateY(-10px); }
            50% { transform: translateX(20px) translateY(10px); }
            75% { transform: translateX(-10px) translateY(5px); }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-100px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            0% {
                opacity: 0;
                transform: translateX(100px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .register-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: none;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
            max-height: 95vh;
            position: relative;
            animation: fadeInUp 1.5s ease-out;
            padding: 40px;
        }

        .register-container::-webkit-scrollbar {
            width: 8px;
        }

        .register-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .register-container::-webkit-scrollbar-thumb {
            background: rgba(129, 199, 132, 0.5);
            border-radius: 10px;
        }

        .register-container::-webkit-scrollbar-thumb:hover {
            background: rgba(129, 199, 132, 0.7);
        }

        .register-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(129, 199, 132, 0.05) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
            z-index: -1;
        }

        .form-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .form-title {
            font-size: 2rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 10px;
        }

        .form-subtitle {
            color: #000000;
            font-size: 1rem;
            opacity: 0.7;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-weight: 600;
            color: #000000;
            margin-bottom: 8px;
            display: block;
            font-size: 0.95rem;
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #000000;
            opacity: 0.6;
            font-size: 1rem;
            z-index: 1;
        }

        .form-control {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 15px 15px 15px 45px;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: #000000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .form-control:focus {
            border-color: #1B5E20;
            background: white;
            box-shadow: 0 0 0 0.2rem rgba(27, 94, 32, 0.25);
            outline: none;
        }

        .form-control:focus + .input-icon {
            color: #1B5E20;
            opacity: 1;
        }

        .form-control::placeholder {
            color: #000000;
            opacity: 0.4;
        }

        .register-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 15px;
            color: #000000;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(129, 199, 132, 0.3);
        }

        .register-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .register-btn:hover::before {
            left: 100%;
        }

        .register-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(129, 199, 132, 0.5);
        }

        .register-btn:active {
            transform: translateY(-1px);
        }

        .alert {
            border-radius: 12px;
            border: none;
            margin-bottom: 20px;
            padding: 15px;
            font-size: 0.95rem;
        }

        .alert-danger {
            background: #fee;
            color: #dc3545;
        }

        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: #000000;
        }

        .login-link a {
            color: #000000;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .login-link a:hover {
            color: #1B5E20;
        }

        .password-strength {
            font-size: 12px;
            margin-top: 6px;
            padding: 8px;
            border-radius: 8px;
            display: none;
        }

        .password-strength.weak {
            background: #fee;
            color: #dc3545;
            display: block;
        }

        .password-strength.medium {
            background: #fff3cd;
            color: #856404;
            display: block;
        }

        .password-strength.strong {
            background: #f0fdf4;
            color: #16a34a;
            display: block;
        }

        .terms-checkbox {
            font-size: 0.9rem;
            color: #000000;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
        }

        .terms-checkbox input {
            margin-right: 8px;
            margin-top: 4px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .terms-checkbox label {
            cursor: pointer;
            margin: 0;
        }

        .terms-checkbox a {
            color: #1B5E20;
            text-decoration: none;
            font-weight: 600;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            body {
                padding: 10px;
            }

            .register-container {
                padding: 30px 20px;
            }

            .form-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Register Container -->
    <div class="register-container">
        <div class="form-header">
            <h2 class="form-title">Create Account</h2>
            <p class="form-subtitle">Start your journey with Smart Waste Management</p>
        </div>
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                </div>
                {% endif %}

                {% if success %}
                <div class="alert alert-success" role="alert">
                    <i class="fas fa-check-circle"></i> {{ success }}
                </div>
                {% endif %}

                <form method="POST" id="registerForm">
                    <div class="form-group">
                        <label class="form-label" for="username">Full Name</label>
                        <div class="input-group">
                            <i class="input-icon fas fa-user"></i>
                            <input 
                                type="text" 
                                id="username"
                                name="username" 
                                class="form-control" 
                                placeholder="Enter your full name" 
                                required
                                minlength="3"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <div class="input-group">
                            <i class="input-icon fas fa-envelope"></i>
                            <input 
                                type="email" 
                                id="email"
                                name="email" 
                                class="form-control" 
                                placeholder="Enter your email address" 
                                required
                                autocomplete="email"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-group">
                            <i class="input-icon fas fa-lock"></i>
                            <input 
                                type="password" 
                                id="password"
                                name="password" 
                                class="form-control" 
                                placeholder="Create a strong password" 
                                required
                                minlength="8"
                                onchange="checkPasswordStrength()"
                                oninput="checkPasswordStrength()"
                            >
                        </div>
                        <div id="passwordStrength" class="password-strength"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirm_password">Confirm Password</label>
                        <div class="input-group">
                            <i class="input-icon fas fa-check-circle"></i>
                            <input 
                                type="password" 
                                id="confirm_password"
                                name="confirm_password" 
                                class="form-control" 
                                placeholder="Confirm your password" 
                                required
                            >
                        </div>
                    </div>

                    <div class="terms-checkbox">
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms">
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="register-btn">
                        <i class="fas fa-user-check"></i> Create Account
                    </button>
                </form>

                <div class="login-link">
                    Already have an account? <a href="/"><i class="fas fa-sign-in-alt"></i> Sign In</a>
                </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strength = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strength.classList.remove('weak', 'medium', 'strong');
                return;
            }

            let strengthLevel = 'weak';
            let strengthText = '🔴 Weak password';

            if (password.length >= 8) {
                if (/[a-z]/.test(password) && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[^a-zA-Z0-9]/.test(password)) {
                    strengthLevel = 'strong';
                    strengthText = '🟢 Strong password';
                } else if (/[a-z]/.test(password) && /[A-Z]/.test(password) && /[0-9]/.test(password)) {
                    strengthLevel = 'medium';
                    strengthText = '🟡 Medium password';
                } else if (/[a-z]/.test(password) && /[A-Z]/.test(password)) {
                    strengthLevel = 'medium';
                    strengthText = '🟡 Medium password';
                }
            }

            strength.textContent = strengthText;
            strength.classList.remove('weak', 'medium', 'strong');
            strength.classList.add(strengthLevel);
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const terms = document.getElementById('terms').checked;

            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match!');
                return;
            }

            if (password.length < 8) {
                e.preventDefault();
                alert('Password must be at least 8 characters long!');
                return;
            }

            if (!terms) {
                e.preventDefault();
                alert('You must accept the terms and conditions!');
                return;
            }

            if (username.length < 3) {
                e.preventDefault();
                alert('Name must be at least 3 characters long!');
                return;
            }
        });
    </script>
</body>
</html>
