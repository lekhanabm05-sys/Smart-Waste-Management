<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleanup Duplicate Bins</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #E8F5E8 0%, #C8E6C9 50%, #A5D6A7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .cleanup-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        .btn-cleanup {
            background: linear-gradient(135deg, #EF5350 0%, #E57373 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn-cleanup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(244, 67, 54, 0.4);
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="cleanup-card">
        <h2 class="text-center mb-4">🗑️ Cleanup Duplicate Bins</h2>
        <p class="text-center text-muted mb-4">
            This will remove all bins with IDs like "BIN-260211-00001" through "BIN-260228-00001" 
            that have "Shopping Mall" as the area name.
        </p>
        
        <div class="alert alert-warning">
            <strong>⚠️ Warning:</strong> This action cannot be undone. Make sure you want to remove these duplicate bins.
        </div>

        <button id="cleanupBtn" class="btn btn-cleanup w-100">
            <i class="bi bi-trash"></i> Remove Duplicate Bins
        </button>

        <div id="result" class="result"></div>

        <div class="text-center mt-4">
            <a href="/admin/pickups" class="text-decoration-none">← Back to Admin Panel</a>
        </div>
    </div>

    <script>
        document.getElementById('cleanupBtn').addEventListener('click', async function() {
            const btn = this;
            const result = document.getElementById('result');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Cleaning up...';
            result.style.display = 'none';

            try {
                const response = await fetch('/api/bin/cleanup-duplicates', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    result.className = 'result success';
                    result.innerHTML = `<strong>✅ Success!</strong><br>${data.message}`;
                    result.style.display = 'block';
                    btn.innerHTML = '✓ Cleanup Complete';
                } else {
                    throw new Error(data.error || 'Cleanup failed');
                }
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = `<strong>❌ Error:</strong><br>${error.message}`;
                result.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-trash"></i> Remove Duplicate Bins';
            }
        });
    </script>
</body>
</html>
